<!DOCTYPE html>
<html lang="nl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Portfolio</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        body {
            font-family: Georgia, serif;
        }
    </style>

    <link rel="stylesheet" href="../css/style.css">


</head>
<body class="d-flex flex-column min-vh-100">
  <main class="flex-grow-1">

<header class="container py-3">
    <div class="d-flex flex-column flex-md-row align-items-center justify-content-between">

        <a href="index.html" class="mb-3 mb-md-0">
            <img src="../Afbeeldingen/logo.png" alt="Logo" class="img-fluid" style="max-width:120px;">
        </a>

        <form id="searchForm" class="d-flex w-100 w-md-auto mb-3 mb-md-0 me-md-3">
            <input class="form-control me-2" type="search" id="searchInput" placeholder="Zoek een pagina..." aria-label="Zoek">
            <button class="btn btn-primary" type="submit">Zoeken</button>
        </form>

        <div class="d-flex flex-wrap justify-content-center">
            <a href="index.html" class="btn btn-outline-primary me-2 mb-2">Home</a>
            <a href="overmij.html" class="btn btn-outline-primary me-2 mb-2">Over mij</a>
            <a href="projecten.html" class="btn btn-outline-primary me-2 mb-2">Projecten</a>
            <a href="contact.html" class="btn btn-outline-primary me-2 mb-2">Contact</a>
        </div>

    </div>

</header>

<div class="p-3 mb-2 bg-primary text-white"></div>

<!-- zoekbalk script -->
<script>
    const pages = {
        "index": "index.html",
        "home": "index.html",
        "over mij": "overmij.html",
        "overmij": "overmij.html",
        "projecten": "projecten.html",
        "travel": "Travel.html",
        "contact": "contact.html",
        "travel and hospitality": "Travel.html"

    };

    document.getElementById("searchForm").addEventListener("submit", function(e) {
        e.preventDefault();
        const query = document.getElementById("searchInput").value.toLowerCase();
        if (pages[query]) {
            window.location.href = pages[query];
        } else {
            alert("Niet gevonden!");
        }
    });
</script>

<div class="contact-container">
  <form action="https://api.web3forms.com/submit" method="POST" class="contact-left">
    <div class="contact-left-title">
      <h2>Contact</h2>
      <hr>
    </div>
    <input type="hidden" name="access_key" value="76b13f89-d513-436e-af00-4026604a4515">
    <input type="text" name="name" placeholder="Jouw naam" class="contact-inputs" required>
    <input type="email" name="email" placeholder="Email" class="contact-inputs" required>
    <textarea name="bericht" placeholder="jouw bericht" class="contact-inputs" required></textarea>
    <button type="submit">Doorsturen</button>
  </form>
  <div class="contact-right">
    <img src="../Afbeeldingen/mail.jpeg">
  </div>
</div>

    <div>
      <a href="overmij.html" class="btn btn-outline-dark me-2 mb-2">Over mij</a>
      <a href="contact.html" class="btn btn-outline-dark me-2 mb-2">Contact</a>

</html>
